<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TCW</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/marked.min.js" defer></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>TCW</h1>
      <p id="summary">Loading...</p>
    </div>
    <nav class="tabs" aria-label="TCW views">
      <button type="button" class="tab active" data-view="work">Work</button>
      <button type="button" class="tab" data-view="taxonomy">Taxonomy</button>
      <button type="button" class="tab" data-view="capabilities">Capabilities</button>
    </nav>
  </header>
  <main class="shell">
    <section class="list-pane">
      <div class="list-head">
        <h2 id="list-title">Work</h2>
        <input id="filter" type="search" placeholder="Filter">
      </div>
      <div id="status-filters" class="status-filters" role="group"
           aria-label="Filter work items by status" hidden></div>
      <div id="list" class="list" role="list"></div>
    </section>
    <section id="detail" class="detail-pane" aria-live="polite"></section>
  </main>
  <div id="toast" class="toast" hidden></div>
</body>
</html>
